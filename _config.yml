# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 乘风
subtitle: 幻想郷の神隠し
description:
keywords:
author: 暮颜
language: zh-CN
timezone:

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: https://mowenpan.xyz/
root: /
permalink: post/:abbrlink.html
abbrlink:
  alg: crc32
  rep: hex
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace:

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ""
  per_page: 8
  order_by: -date

archive_generator:
  enabled: true
  per_page: 15
  yearly: true
  monthly: true
  daily: false
  order_by: -date

category_generator:
  per_page: 15
  order_by: -date

tag_generator:
  per_page: 15
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: maupassant

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
  type: git
  repo: https://github.com/MowenPan/MowenPan.github.io.git
  branch: master

mathjax: true

search:
  path: search.xml
  field: post
  format: html
  limit: 10000

feed:
  type: rss2
  path: rss2.xml
  limit: 15
  hub:
  content: "true"

live2d:
  enable: true
  scriptFrom: local
  pluginRootPath: live2dw/
  pluginJsPath: lib/
  pluginModelPath: assets/
  tagMode: false
  log: false
  model:
    use: live2d-widget-model-miku
  display:
    position: right
    width: 300
    height: 600
  mobile:
    show: false
  react:
    opacity: 0.7

encrypt:
  enable: true
  default_abstract: 这是一篇加密文章，内容可能是个人情感宣泄或者收费技术。如果你确实想看，请与我联系。
  default_message: 输入密码，查看文章。

beautify:
  types:
    - html
    - css
    - js
  exclude:
    - "*.min.css"
    - "*.min.js"
  html:
    "indent_inner_html": true
    "indent_size": 4
    "indent_with_tabs": true
    # More Options (https://github.com/beautify-web/js-beautify/blob/master/README.md)
  css:
    "indent_size": 4
    "newline_between_rules": true
    "indent_with_tabs": true
    # More Options (https://github.com/beautify-web/js-beautify/blob/master/README.md)
  js:
    "indent_size": 4
    "indent_with_tabs": true
    # More Options (https://github.com/beautify-web/js-beautify/blob/master/README.md)
